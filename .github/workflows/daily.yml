name: Daily dashboard (generate + publish)

on:
  schedule:
    - cron: '45 12 * * 1-5'      # ~09:00 ET weekdays (UTC; adjust for DST if needed)
  workflow_dispatch:            # manual "Run workflow" button for testing

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install jinja2

      - name: Generate today's data (Anthropic API + web search)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: Build latest.html from the data
        run: python build_html.py

      - name: Publish (commit latest.html + data)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.html dashboard_data.json
          git commit -m "Auto: dashboard $(date -u +%Y-%m-%d)" || echo "Nothing to commit"
          git push
