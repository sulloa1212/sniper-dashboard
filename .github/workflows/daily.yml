name: Daily dashboard (generate + publish)

on:
  # Scheduling lives on cron-job.org (8:40 AM ET weekdays, DST-aware), which
  # POSTs to this workflow's /dispatches endpoint. No GitHub schedule here so
  # the report can never double-generate.
  workflow_dispatch:            # manual "Run workflow" button + cron-job.org trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- Python: generate today's data + build the HTML ----
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install jinja2

      # ---- Pull today's scanner board from the sniper-scanner repo ----
      # Non-fatal by design: if the scanner didn't run, failed, or the token is
      # missing, generate.py falls back to web-search setups (marked as not
      # scanner-verified). Only a run created TODAY is accepted — yesterday's
      # board must never masquerade as today's.
      - name: Fetch scanner board (non-fatal)
        env:
          GH_TOKEN: ${{ secrets.SCANNER_TOKEN }}
        run: |
          set +e
          if [ -z "$GH_TOKEN" ]; then
            echo "SCANNER_TOKEN not set — skipping scanner fetch."
            exit 0
          fi
          TODAY=$(date -u +%Y-%m-%d)
          RUN_ID=$(gh run list --repo sulloa1212/sniper-scanner \
            --workflow daily-scan.yml --status success --limit 5 \
            --json databaseId,createdAt \
            -q "[.[] | select(.createdAt >= \"$TODAY\")][0].databaseId")
          if [ -z "$RUN_ID" ]; then
            echo "No successful scanner run from today — falling back to web search."
            exit 0
          fi
          gh run download "$RUN_ID" --repo sulloa1212/sniper-scanner --dir scanner_data \
            || echo "Artifact download failed — falling back to web search."
          ls -R scanner_data 2>/dev/null || true
          exit 0

      - name: Generate today's data (Anthropic API + web search)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: Build latest.html from the data
        run: python build_html.py

      # ---- Node: render the PNG and refresh the archive (folded in from build.yml) ----
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install emoji font (cleaner PNG text)
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-color-emoji

      - name: Install Node dependencies
        run: npm install

      - name: Render PNG + refresh archive (last 5 days + index.json)
        run: node render.js

      # ---- Commit everything in ONE push so no cross-workflow trigger is needed ----
      - name: Publish (commit report, image, data, and archive)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.html latest.png dashboard_data.json archive/ -A
          git commit -m "Auto: dashboard $(TZ=America/New_York date +%Y-%m-%d)" || echo "Nothing to commit"
          git push
