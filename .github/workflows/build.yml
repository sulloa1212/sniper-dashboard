name: Render dashboard PNG + archive

on:
  push:
    paths:
      - 'latest.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install emoji font (cleaner PNG text)
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-color-emoji

      - name: Install dependencies
        run: npm install

      - name: Render PNG and archive
        run: node render.js

      - name: Commit the generated image + archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.png archive/ -A
          git commit -m "Auto: render PNG + archive ($(TZ=America/New_York date +%Y-%m-%d))" || echo "Nothing to commit"
          git push
